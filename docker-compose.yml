version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: forge_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: forge
      POSTGRES_PASSWORD: forge
      POSTGRES_DB: forge
    ports:
      - "5432:5432"
    volumes:
      - forge_postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: forge_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - forge_redis_data:/data

volumes:
  forge_postgres_data:
  forge_redis_data: